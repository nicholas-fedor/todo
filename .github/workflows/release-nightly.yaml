name: Release Nightly

on:
  # Manual runs with option of dry-run (for testing CI pipeline)
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run in test mode without publishing artifacts"
        required: false
        default: false
        type: boolean
  # Daily scheduled run at midnight UTC
  schedule:
    - cron: "0 0 * * *" # Runs every day at 00:00 UTC

permissions:
  contents: read

jobs:
  # Check if any watched files have changed since last successful nightly run
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # Fetch full history to compare
          persist-credentials: false

      - name: Get last successful nightly run commit
        id: last-run
        run: |
          # Find the most recent successful run of this workflow (not failed/cancelled)
          LAST_NIGHTLY_COMMIT=$(gh api repos/"${{ github.repository }}"/actions/runs \
            --jq '.workflow_runs[] | select(.status=="completed" and .conclusion=="success" and .path==".github/workflows/release-nightly.yaml") | .head_sha' | head -1)
          echo "last_nightly_commit=$LAST_NIGHTLY_COMMIT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes in watched paths
        id: check
        run: |
          LAST_NIGHTLY_COMMIT="${STEPS_LAST_RUN_OUTPUTS_LAST_NIGHTLY_COMMIT}"
          if [ -z "$LAST_NIGHTLY_COMMIT" ]; then
            echo "No previous successful nightly run found, proceeding with build"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if there are any changes in the watched paths since last successful nightly run
          CHANGED=$(git diff --name-only "$LAST_NIGHTLY_COMMIT" HEAD -- cmd/ internal/ main.go go.mod go.sum || true)

          if [ -n "$CHANGED" ]; then
            echo "Detected changes in watched paths:"
            echo "$CHANGED"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected in watched paths since last successful nightly run"
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          STEPS_LAST_RUN_OUTPUTS_LAST_NIGHTLY_COMMIT: ${{ steps.last-run.outputs.last_nightly_commit }}

  # Run Go tests and upload coverage
  test:
    needs: [check_changes]
    if: ${{ needs.check_changes.outputs.has-changes == 'true' }}
    uses: ./.github/workflows/test.yaml
    permissions:
      contents: read # For code checkout

  # Build binaries, images, SBOMs, and attestations
  build:
    needs: [check_changes, test]
    if: ${{ needs.check_changes.outputs.has-changes == 'true' }}
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    permissions:
      contents: write # For code checkout and uploading release artifacts
      packages: write # For pushing images to registries
      attestations: write # For generating provenance and SBOMs
      id-token: write # For OIDC auth to Docker Hub and GHCR
    with:
      build-type: nightly # Nightly release
      dry-run: ${{ inputs.dry-run || false }} # Boolean, defaults false
      project_name: todo
      docker_namespace: nickfedor
      ghcr_namespace: nicholas-fedor
      environment: CI
