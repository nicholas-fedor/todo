################################################################################
#                                                                              #
#                 GoReleaser OSS Nightly Release Configuration                 #
#                                                                              #
# Project: Todo                                                                #
# Project Repository: https://github.com/nicholas-fedor/todo/                  #
#                                                                              #
# GoReleaser URL: https://goreleaser.com/                                      #
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json      #
# vim: set ts=2 sw=2 tw=0 fo=cnqoj                                             #
#                                                                              #
################################################################################

################################################################################
# Configuration Version
version: 2
################################################################################

################################################################################
# General Configuration
# https://goreleaser.com/customization/general/
################################################################################

# ################################################################################
# Project Name
# https://goreleaser.com/customization/project/
# ################################################################################
project_name: "{{ .ProjectName }}"

################################################################################
# Verifiable Builds (Supply Chain Security)
# https://goreleaser.com/customization/builds/verifiable_builds/
################################################################################
gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GOSUMDB=sum.golang.org

################################################################################
# Go Binary Build Configuration
# https://goreleaser.com/customization/builds/go/
################################################################################
  builds:
    - id: "{{ .ProjectName }}-binary"
      main: ./cmd/server
    binary: "{{ .ProjectName }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
      - riscv64
    ignore:
      - goos: windows
        goarch: riscv64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"

################################################################################
# Binary Archive Configuration
# https://goreleaser.com/customization/package/archives/
################################################################################
archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{- .ProjectName }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm" }}armhf
      {{- else if eq .Arch "arm64" }}arm64v8
      {{- else if eq .Arch "riscv64" }}riscv64
      {{- else }}{{ .Arch }}{{ end }}_
      {{- .Version -}}
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
    builds_info:
      mtime: "{{ .CommitTimestamp }}"

################################################################################
# Source Archive Configuration
################################################################################
source:
  enabled: true
  name_template: "{{ .ProjectName }}.src"

################################################################################
# Checksums Configuration
# https://goreleaser.com/customization/package/checksum/
################################################################################
checksum:
  name_template: "checksums.txt"

################################################################################
# Docker Digests Configuration
# https://goreleaser.com/customization/package/docker_digests/
################################################################################
docker_digest:
  name_template: "digests.txt"

################################################################################
# Docker Image Build Configuration (Modern dockers_v2)
# https://goreleaser.com/customization/package/dockers_v2/
################################################################################
dockers_v2:
  ##############################################################################
  # Multi-platform manifest (all platforms) - non-prefixed dev tag only
  ##############################################################################
  - id: "{{ .ProjectName }}-manifest-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "latest-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/amd64
      - linux/386
      - linux/arm/v6
      - linux/arm64
      - linux/riscv64
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

  ##############################################################################
  # Platform-specific images - platform-prefixed dev tags only
  ##############################################################################
  - id: "{{ .ProjectName }}-amd64-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "amd64-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/amd64
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

  - id: "{{ .ProjectName }}-i386-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "i386-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/386
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

  - id: "{{ .ProjectName }}-armhf-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "armhf-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/arm/v6
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

  - id: "{{ .ProjectName }}-arm64v8-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "arm64v8-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/arm64
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

  - id: "{{ .ProjectName }}-riscv64-dev"
    ids: ["{{ .ProjectName }}-binary"]
    images:
      - "{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"
    tags:
      - "riscv64-dev"
    dockerfile: build/docker/Dockerfile
    platforms:
      - linux/riscv64
    labels:
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.description: "A basic test todo app."
      org.opencontainers.image.licenses: "AGPLv3"
      org.opencontainers.image.url: "https://hub.docker.com/r/{{ .Env.DOCKER_NAMESPACE }}/{{ .ProjectName }}"
      org.opencontainers.image.documentation: "https://github.com/{{ .Env.GHCR_NAMESPACE }}/{{ .ProjectName }}"

################################################################################
# Software Bill of Materials (SBOM) Configuration
# https://goreleaser.com/customization/sbom/
################################################################################
sboms:
  - id: binaries
    artifacts: archive
  - id: source
    artifacts: source

################################################################################
# Signing Configuration (Cosign - Keyless OIDC)
# https://goreleaser.com/customization/sign/
################################################################################
signs:
  - id: cosign-checksums
    cmd: cosign
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

################################################################################
# Docker Image Signing (Cosign)
# https://goreleaser.com/customization/sign/docker_sign/
################################################################################
docker_signs:
  - id: cosign-images
    cmd: cosign
    args:
      - "sign"
      - "${artifact}"
      - "--yes"
    artifacts: all
    output: true

################################################################################
# Changelog Configuration
# https://goreleaser.com/customization/changelog/
################################################################################
changelog:
  disable: true
